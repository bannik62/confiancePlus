name: Deploy Prod Backend

on:
  push:
    branches: [prod]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: habitracks
    steps:
      - uses: actions/checkout@v6

      - name: Ensure backend dir exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY_HABITTRACKER }}
          port: ${{ secrets.PORT }}
          script: |
            DEP="${{ secrets.DEPLOY_PATH }}"
            sudo mkdir -p "$DEP/frontend" "$DEP/backend"
            sudo chown -R "$(whoami):www-data" "$DEP"
            sudo find "$DEP" -type d -exec chmod g+s {} \;
            sudo chmod -R g+rwX "$DEP"

      # rsync over SSH: avoids drone-scp remote "tar -z" (exit 127 if gzip/tar PATH differs on VPS).
      - name: Copy backend and compose to VPS (rsync)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY_HABITTRACKER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.PROD_SERVER_USER }}
          VPS_PORT: ${{ secrets.PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          DEP="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
          test -n "$DEP"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/habitracks_deploy
          chmod 600 ~/.ssh/habitracks_deploy
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          export RSYNC_RSH="ssh -i $HOME/.ssh/habitracks_deploy -p $VPS_PORT -o StrictHostKeyChecking=accept-new"
          rsync -avz --delete backend/ "${VPS_USER}@${VPS_HOST}:${DEP}/backend/"
          rsync -avz docker-compose.prod.yml "${VPS_USER}@${VPS_HOST}:${DEP}/"

      - name: Rebuild and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY_HABITTRACKER }}
          port: ${{ secrets.PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d db
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod stop backend || true
            sudo docker compose -f docker-compose.prod.yml rm -f backend || true
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod build backend
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps backend
