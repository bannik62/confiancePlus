name: Deploy Prod Frontend

on:
  push:
    branches: [prod]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: habitracks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps and build frontend
        run: |
          npm install
          npm run build
        working-directory: frontend

      - name: Ensure target dir exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_HABITTRACKS }}
          username: ${{ secrets.PROD_SERVER_USER_HABITTRACKS }}
          key: ${{ secrets.DEPLOY_SSH_KEY_HABITTRACKS }}
          port: 2222
          script: |
            DEP="${{ secrets.DEPLOY_PATH_HABITTRACKS }}"
            sudo mkdir -p "$DEP/frontend" "$DEP/backend"
            sudo chown -R "$(whoami):www-data" "$DEP"
            sudo find "$DEP" -type d -exec chmod g+s {} \;
            sudo chmod -R g+rwX "$DEP"

      - name: Copy frontend dist to VPS (scp)
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST_HABITTRACKS }}
          username: ${{ secrets.PROD_SERVER_USER_HABITTRACKS }}
          key: ${{ secrets.DEPLOY_SSH_KEY_HABITTRACKS }}
          port: 2222
          source: "frontend/dist/**"
          target: "${{ secrets.DEPLOY_PATH_HABITTRACKS }}/frontend"
          strip_components: 2
          rm: false
