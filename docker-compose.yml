# Données Postgres : volume nommé `pgdata`. Ne pas utiliser `docker compose down -v`
# si tu veux garder utilisateurs / habitudes — le `-v` supprime ce volume.

services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    # Docker / reverse-proxy ajoutent souvent X-Forwarded-For ; Express doit faire confiance au 1er proxy (rate-limit + req.ip).
    environment:
      TRUST_PROXY: "1"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
